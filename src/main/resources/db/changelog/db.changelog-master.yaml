databaseChangeLog:
  - changeSet:
      id: 001-create-users
      author: codex
      changes:
        - createTable:
            tableName: app_user
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: varchar(80)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: display_name
                  type: varchar(160)
                  constraints:
                    nullable: false
              - column:
                  name: password_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(24)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: timestamptz
  - changeSet:
      id: 002-create-content
      author: codex
      changes:
        - createTable:
            tableName: post
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: owner_id, type: uuid, constraints: { nullable: false } }
              - column: { name: body, type: text, constraints: { nullable: false } }
              - column: { name: created_at, type: timestamptz, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamptz, constraints: { nullable: false } }
              - column: { name: deleted_at, type: timestamptz }
        - createTable:
            tableName: album
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: owner_id, type: uuid, constraints: { nullable: false } }
              - column: { name: title, type: varchar(180), constraints: { nullable: false } }
              - column: { name: description, type: text }
              - column: { name: created_at, type: timestamptz, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamptz, constraints: { nullable: false } }
              - column: { name: deleted_at, type: timestamptz }
        - createTable:
            tableName: photo
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: owner_id, type: uuid, constraints: { nullable: false } }
              - column: { name: parent_type, type: varchar(24), constraints: { nullable: false } }
              - column: { name: parent_id, type: uuid, constraints: { nullable: false } }
              - column: { name: caption, type: text }
              - column: { name: original_filename, type: varchar(255), constraints: { nullable: false } }
              - column: { name: content_type, type: varchar(80), constraints: { nullable: false } }
              - column: { name: file_size, type: bigint, constraints: { nullable: false } }
              - column: { name: storage_path, type: varchar(500), constraints: { nullable: false } }
              - column: { name: created_at, type: timestamptz, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamptz, constraints: { nullable: false } }
              - column: { name: deleted_at, type: timestamptz }
        - createTable:
            tableName: comment
            columns:
              - column: { name: id, type: uuid, constraints: { primaryKey: true, nullable: false } }
              - column: { name: owner_id, type: uuid, constraints: { nullable: false } }
              - column: { name: target_type, type: varchar(24), constraints: { nullable: false } }
              - column: { name: target_id, type: uuid, constraints: { nullable: false } }
              - column: { name: body, type: text, constraints: { nullable: false } }
              - column: { name: created_at, type: timestamptz, constraints: { nullable: false } }
              - column: { name: updated_at, type: timestamptz, constraints: { nullable: false } }
              - column: { name: deleted_at, type: timestamptz }
        - createIndex:
            tableName: post
            indexName: idx_post_created_at
            columns:
              - column: { name: created_at }
        - createIndex:
            tableName: album
            indexName: idx_album_created_at
            columns:
              - column: { name: created_at }
        - createIndex:
            tableName: photo
            indexName: idx_photo_parent
            columns:
              - column: { name: parent_type }
              - column: { name: parent_id }
        - createIndex:
            tableName: comment
            indexName: idx_comment_target
            columns:
              - column: { name: target_type }
              - column: { name: target_id }
